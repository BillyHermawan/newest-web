<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KKA Edu - Learn AI & Coding</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-900 text-white font-sans">

    <section id="login-page" class="flex items-center justify-center h-screen">
        <div class="bg-gray-800 p-8 rounded-2xl shadow-2xl border border-cyan-500 w-96">
            <h2 class="text-3xl font-bold mb-6 text-cyan-400 text-center">Masuk ke KKA</h2>
            <div class="space-y-4">
                <input type="text" id="userName" placeholder="Nama Lengkap" class="w-full p-3 rounded bg-gray-700 border border-gray-600 focus:outline-none focus:border-cyan-400">
                <input type="number" id="userAge" placeholder="Usia" class="w-full p-3 rounded bg-gray-700 border border-gray-600">
                <input type="text" id="userClass" placeholder="Kelas" class="w-full p-3 rounded bg-gray-700 border border-gray-600">
                <button onclick="startLearning()" class="w-full bg-cyan-500 hover:bg-cyan-400 text-white font-bold py-3 rounded-lg transition-all transform hover:scale-105 active:scale-95 shadow-lg shadow-cyan-500/50">
                    Mulai Belajar 🚀
                </button>
            </div>
        </div>
    </section>

    <main id="dashboard" class="hidden p-6 max-w-4xl mx-auto">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500">
                Halo, <span id="display-name">Sobat KKA</span>!
            </h1>
            <p class="text-gray-400 mt-2">Selamat datang di modul Koding & Kecerdasan Artifisial.</p>
        </header>

        <div class="bg-gray-800 p-6 rounded-xl border-l-4 border-purple-500 mb-8">
            <h3 class="text-xl font-bold mb-4 text-purple-400">🤖 Simulasi Pengenalan Gambar</h3>
            <p class="text-sm mb-4">AI bekerja dengan mengenali pola. Klik tombol di bawah untuk melihat apa yang dipikirkan AI!</p>
            <div class="flex gap-4 mb-4">
                <button onclick="simulateAI('Kucing')" class="btn-interact bg-purple-600 p-2 rounded">🐱 Kucing</button>
                <button onclick="simulateAI('Anjing')" class="btn-interact bg-blue-600 p-2 rounded">🐶 Anjing</button>
                <button onclick="simulateAI('Mobil')" class="btn-interact bg-green-600 p-2 rounded">🚗 Mobil</button>
            </div>
            <div id="ai-result" class="p-4 bg-black rounded text-green-400 font-mono text-sm">
                Status AI: Menunggu input...
            </div>
        </div>

        <div class="bg-gray-800 p-6 rounded-xl border-l-4 border-yellow-500">
            <h3 class="text-xl font-bold mb-4 text-yellow-400">📝 Quiz Cepat KKA</h3>
            <div id="quiz-container">
                <p id="question" class="mb-4 font-medium">Apa kepanjangan dari AI?</p>
                <div class="grid grid-cols-1 gap-2">
                    <button onclick="checkAnswer(true)" class="quiz-btn">Artificial Intelligence</button>
                    <button onclick="checkAnswer(false)" class="quiz-btn">Automatic Internet</button>
                </div>
            </div>
            <div id="quiz-feedback" class="mt-4 hidden"></div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
